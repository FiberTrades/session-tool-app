name: Keep Supabase awake

# Pings the database every 3 days so the free project never hits the
# 7-day inactivity pause. It does a tiny UPDATE on the `keepalive` table,
# which counts as real database activity.
#
# The values below are the PUBLIC client values (the same Supabase URL and
# publishable key already baked into index.html) — safe to commit.
# NEVER put the service_role key in here.

on:
  schedule:
    - cron: '17 7 */3 * *'   # every 3 days at 07:17 UTC
  workflow_dispatch:          # adds a manual "Run workflow" button in the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the keepalive row
        run: |
          curl -sS -X PATCH \
            "https://figozyxoyobixadhqewr.supabase.co/rest/v1/keepalive?id=eq.1" \
            -H "apikey: sb_publishable_h-TrkkVzrGOkwX6LxMDsaQ_hE8540Nv" \
            -H "Authorization: Bearer sb_publishable_h-TrkkVzrGOkwX6LxMDsaQ_hE8540Nv" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"last_ping\":\"$(date -u +%FT%TZ)\"}" \
            --fail-with-body
